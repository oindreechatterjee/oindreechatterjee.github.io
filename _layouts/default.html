<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>
<meta name="description" content="{{ page.description }}">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta property="og:title" content="{{ page.title }}">
<meta property="og:description" content="{{ page.description }}">
<meta property="og:url" content="https://oindreechatterjee.github.io{{ page.url }}">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="corner corner-tl" aria-hidden="true">
  <svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 10 C 60 30, 90 70, 60 110" fill="none" stroke="#bcd8b0" stroke-width="3"/>
    <path d="M20 20 C 70 20, 100 60, 80 100" fill="none" stroke="#bcd8b0" stroke-width="2"/>
    <g fill="#f3c6d3"><circle cx="30" cy="25" r="10"/><circle cx="50" cy="15" r="8"/><circle cx="20" cy="45" r="7"/></g>
    <g fill="#f7d9e2"><circle cx="70" cy="45" r="9"/><circle cx="90" cy="65" r="7"/></g>
  </svg>
</div>
<div class="corner corner-tr" aria-hidden="true">
  <svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(160,40)">
      <circle cx="0" cy="-28" r="20" fill="#f2a7bd"/>
      <circle cx="26" cy="-14" r="20" fill="#f2a7bd"/>
      <circle cx="26" cy="14" r="20" fill="#f2a7bd"/>
      <circle cx="0" cy="28" r="20" fill="#f2a7bd"/>
      <circle cx="-26" cy="14" r="20" fill="#f2a7bd"/>
      <circle cx="-26" cy="-14" r="20" fill="#f2a7bd"/>
      <circle cx="0" cy="0" r="14" fill="#fbe2c8"/>
    </g>
    <g fill="#f7d9e2"><circle cx="55" cy="90" r="8"/><circle cx="35" cy="70" r="6"/></g>
  </svg>
</div>

<header class="site-header">
  <a class="brand" href="/">Oindree Chatterjee</a>
  <nav class="tabs" aria-label="Primary">
    <a class="tab-link{% if page.url == '/' %} active{% endif %}" href="/">Home</a>
    <a class="tab-link{% if page.url == '/research' %} active{% endif %}" href="/research">Research</a>
    <a class="tab-link{% if page.url == '/vsco' %} active{% endif %}" href="/vsco">Photography</a>
    <a class="tab-link{% if page.url == '/projects' %} active{% endif %}" href="/projects">Projects</a>
  </nav>
</header>

<main>
{{ content }}
</main>

<div class="corner corner-bl" aria-hidden="true">
  <svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
    <g fill="#f7d9e2"><circle cx="30" cy="190" r="12"/><circle cx="55" cy="205" r="9"/><circle cx="15" cy="165" r="7"/></g>
    <g fill="#f2a7bd"><circle cx="70" cy="185" r="8"/></g>
  </svg>
</div>

<footer class="site-footer">
  <div class="wave" aria-hidden="true">
    <svg viewBox="0 0 600 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 30 C 150 60, 450 0, 600 30 L 600 60 L 0 60 Z" fill="#f7d9e2"/>
    </svg>
  </div>
  <p class="footer-links">
    <a href="https://github.com/oindreechatterjee" target="_blank" rel="noopener">GitHub</a>
    <a href="https://www.linkedin.com/in/oindreec/" target="_blank" rel="noopener">LinkedIn</a>
    <a href="https://dblp.org/pid/397/5166.html" target="_blank" rel="noopener">Publications</a>
    <a class="email-link">Email</a>
  </p>
  <p>&copy; <span id="year"></span> Oindree Chatterjee</p>
</footer>

<script src="/js/script.js"></script>
</body>
</html>
